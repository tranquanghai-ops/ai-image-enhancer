<!DOCTYPE html>
<html lang="vi" class="h-full bg-slate-950 text-slate-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Enhancer Image - ứng dụng AI hình ảnh</title>
    
    <!-- Tailwind CSS để tạo kiểu giao diện cực đẹp -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font chữ Inter sắc nét -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome 6 để nạp đầy đủ biểu tượng sắc nét -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React & ReactDOM (Phiên bản 18) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel Standalone để biên dịch JSX trực tiếp trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Thư viện JSZip để nén ảnh thành file ZIP khi tải về hàng loạt -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Hiệu ứng mờ nhấp nháy khi đang tải */
        @keyframes shimmer-loader {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(150%); }
        }
        .animate-shimmer-loader {
            animation: shimmer-loader 1.6s infinite linear;
        }
        /* Custom thanh cuộn tối mịn */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
    </style>
</head>
<body class="h-full flex flex-col justify-between">

    <!-- DIV gốc để React mount giao diện vào -->
    <div id="root" class="min-h-screen flex flex-col justify-between"></div>

    <!-- Google Identity Services (Xử lý Đăng nhập OAuth 2.0) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Kịch bản lập trình chính bằng React + JSX thông qua Babel -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const HARDCODED_CLIENT_ID = "1091667798732-1tjra4rm4ikf2u6c1upavnd6ot5qasld.apps.googleusercontent.com";
        const REQUESTED_SCOPES = "https://www.googleapis.com/auth/generative-language.retriever https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email";

        function App() {
            const [imagesList, setImagesList] = useState([]);
            const [activeImageId, setActiveImageId] = useState(null);
            
            const [isProcessing, setIsProcessing] = useState(false);
            const [isBatchProcessing, setIsBatchProcessing] = useState(false);
            
            const [activeTools, setActiveTools] = useState(['enhance', 'cleanup']);
            const [expandDirections, setExpandDirections] = useState(['up', 'down', 'left', 'right']);
            const [aspectRatio, setAspectRatio] = useState('current'); 
            const [upscaleOption, setUpscaleOption] = useState('original');
            const [customPrompt, setCustomPrompt] = useState('');
            const [error, setError] = useState('');
            const [viewMode, setViewMode] = useState('split');
            
            const [sliderPosition, setSliderPosition] = useState(50);
            const [zoomScale, setZoomScale] = useState(1);
            const [historyList, setHistoryList] = useState([]); 

            const [moodboardImages, setMoodboardImages] = useState([]); 
            const [crossRefImages, setCrossRefImages] = useState([]); 

            // Panning/dragging state for zoomed image view
            const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
            const [isPanning, setIsPanning] = useState(false);
            const [panMode, setPanMode] = useState(false);
            const panStart = useRef({ x: 0, y: 0 });

            // Custom confirmation modal state
            const [deleteConfirm, setDeleteConfirm] = useState({ show: false, type: null, id: null });

            const fileInputRef = useRef(null);
            const jsonInputRef = useRef(null);
            const moodboardInputRef = useRef(null);
            const crossRefInputRef = useRef(null);
            
            const isCancelBatchRef = useRef(false);

            // --- Quản lý Trạng thái Đăng nhập Google & Đồng bộ đám mây ---
            const [gisLoaded, setGisLoaded] = useState(false);
            const [googleUser, setGoogleUser] = useState(null); // { name, email, picture, accessToken }
            const [syncStatus, setSyncStatus] = useState('idle'); // 'idle' | 'syncing' | 'synced' | 'error'
            const [driveFileId, setDriveFileId] = useState(null);
            const [isDemoMode, setIsDemoMode] = useState(false);

            useEffect(() => {
                const checkGis = setInterval(() => {
                    if (window.google && window.google.accounts && window.google.accounts.oauth2) {
                        setGisLoaded(true);
                        clearInterval(checkGis);
                    }
                }, 500);

                // Khôi phục dữ liệu cục bộ dự phòng (nếu có)
                const localState = localStorage.getItem('ai_enhancer_local_backup');
                if (localState) {
                    try {
                        const parsed = JSON.parse(localState);
                        if (parsed.imagesList && parsed.imagesList.length > 0) {
                            setImagesList(parsed.imagesList);
                            setActiveImageId(parsed.imagesList[0].id);
                        }
                        if (parsed.historyList) {
                            setHistoryList(parsed.historyList);
                        }
                    } catch (e) {
                        console.error("Lỗi đọc dữ liệu khôi phục cũ:", e);
                    }
                }

                return () => clearInterval(checkGis);
            }, []);

            const handleGoogleSignIn = () => {
                if (!window.google?.accounts?.oauth2) {
                    setError("Không thể nạp thư viện xác thực Google. Hãy đảm bảo bạn đang mở trang trên một môi trường mạng chính thức.");
                    return;
                }
                setError('');

                try {
                    const client = window.google.accounts.oauth2.initTokenClient({
                        client_id: HARDCODED_CLIENT_ID,
                        scope: REQUESTED_SCOPES,
                        callback: async (tokenResponse) => {
                            if (tokenResponse.error) {
                                setError(`Đăng nhập thất bại: ${tokenResponse.error_description || tokenResponse.error}`);
                                return;
                            }

                            try {
                                const userInfoRes = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                                    headers: { Authorization: `Bearer ${tokenResponse.access_token}` }
                                });
                                const userInfo = await userInfoRes.json();
                                
                                const userObj = {
                                    name: userInfo.name,
                                    email: userInfo.email,
                                    picture: userInfo.picture,
                                    accessToken: tokenResponse.access_token
                                };

                                setGoogleUser(userObj);
                                setIsDemoMode(false);
                                
                                // Tải tự động dữ liệu từ Google Drive của bạn
                                loadSessionFromDrive(tokenResponse.access_token);
                            } catch (profileErr) {
                                setError("Đăng nhập thành công nhưng không tìm thấy thông tin profile.");
                            }
                        },
                    });
                    client.requestAccessToken({ prompt: 'consent' });
                } catch (err) {
                    console.error(err);
                    setError("Gặp lỗi trong lúc gọi cửa sổ ủy quyền tài khoản Google.");
                }
            };

            const handleGoogleSignOut = () => {
                setGoogleUser(null);
                setDriveFileId(null);
                setSyncStatus('idle');
            };

            const loadSessionFromDrive = async (token) => {
                setSyncStatus('syncing');
                try {
                    const searchUrl = `https://www.googleapis.com/drive/v3/files?q=name='ai_enhancer_byoa_session.json'+and+trashed=false&fields=files(id,name)`;
                    const searchRes = await fetch(searchUrl, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const searchResult = await searchRes.json();
                    const files = searchResult.files;

                    if (files && files.length > 0) {
                        const fileId = files[0].id;
                        setDriveFileId(fileId);

                        const contentRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                            headers: { Authorization: `Bearer ${token}` }
                        });
                        const data = await contentRes.json();

                        if (data) {
                            if (data.imagesList && data.imagesList.length > 0) {
                                setImagesList(data.imagesList);
                                setActiveImageId(data.activeImageId || data.imagesList[0].id);
                            }
                            if (data.historyList) {
                                setHistoryList(data.historyList);
                            }
                            setSyncStatus('synced');
                        }
                    } else {
                        setSyncStatus('idle');
                    }
                } catch (err) {
                    console.error("Lỗi đồng bộ tải dữ liệu từ Drive:", err);
                    setSyncStatus('error');
                }
            };

            const syncSessionToDrive = async () => {
                if (!googleUser) return;
                setSyncStatus('syncing');

                try {
                    const stateToSave = {
                        imagesList,
                        activeImageId,
                        historyList
                    };

                    let response;
                    if (driveFileId) {
                        response = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
                            method: 'PATCH',
                            headers: {
                                Authorization: `Bearer ${googleUser.accessToken}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(stateToSave)
                        });
                    } else {
                        const metadata = {
                            name: 'ai_enhancer_byoa_session.json',
                            mimeType: 'application/json'
                        };
                        const boundary = 'ai_enhancer_boundary_token_xyz';
                        const multipartBody = 
                            `--${boundary}\r\n` +
                            `Content-Type: application/json; charset=UTF-8\r\n\r\n` +
                            `${JSON.stringify(metadata)}\r\n` +
                            `--${boundary}\r\n` +
                            `Content-Type: application/json\r\n\r\n` +
                            `${JSON.stringify(stateToSave)}\r\n` +
                            `--${boundary}--`;

                        response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                            method: 'POST',
                            headers: {
                                Authorization: `Bearer ${googleUser.accessToken}`,
                                'Content-Type': `multipart/related; boundary=${boundary}`
                            },
                            body: multipartBody
                        });
                    }

                    const result = await response.json();
                    if (result && result.id) {
                        setDriveFileId(result.id);
                        setSyncStatus('synced');
                    } else {
                        setSyncStatus('error');
                    }
                } catch (err) {
                    console.error("Lỗi đồng bộ lưu trữ tệp:", err);
                    setSyncStatus('error');
                }
            };

            useEffect(() => {
                if (imagesList.length > 0) {
                    const localState = { imagesList, historyList };
                    localStorage.setItem('ai_enhancer_local_backup', JSON.stringify(localState));
                }
            }, [imagesList, historyList]);

            const tools = [
                { id: 'enhance', name: 'Làm Nét', icon: 'fa-wand-magic-sparkles', desc: 'Tăng độ phân giải, cải thiện chi tiết ảnh' },
                { id: 'beautify', name: 'Làm Đẹp AI', icon: 'fa-face-smile', desc: 'Làm mịn da chân dung tự nhiên' },
                { id: 'cleanup', name: 'Xóa Chi Tiết', icon: 'fa-eraser', desc: 'Xóa logo, vật thể thừa, chữ gây nhiễu' },
                { id: 'restore', name: 'Phục hồi ảnh cũ', icon: 'fa-rotate-left', desc: 'Khử hạt nhiễu, mờ vết trầy cũ' },
                { id: 'sketch', name: 'Sketch to Render', icon: 'fa-paintbrush', desc: 'Bản vẽ phác thảo thành render thực' },
                { id: 'expand', name: 'Mở rộng hình', icon: 'fa-expand', desc: 'Mở rộng khung viền ngoài (Outpainting)' }
            ];

            const selectImage = (id) => {
                setActiveImageId(id);
                const img = imagesList.find(i => i.id === id);
                if (img) {
                    setActiveTools(img.activeTools || ['enhance']);
                    setUpscaleOption(img.upscaleOption || 'original');
                    setExpandDirections(img.expandDirections || ['up', 'down', 'left', 'right']);
                    setAspectRatio(img.aspectRatio || 'current');
                    setCustomPrompt(img.customPrompt || '');
                    setMoodboardImages(img.moodboardImages || []);
                    setCrossRefImages(img.crossRefImages || []);
                    setZoomScale(1);
                    setPanOffset({ x: 0, y: 0 });
                }
            };

            const updateActiveImageProp = (key, value) => {
                setImagesList(prev => prev.map(img => {
                    if (img.id === activeImageId) {
                        return { ...img, [key]: value };
                    }
                    return img;
                }));
            };

            const getDimensionsForImg = (img) => {
                if (!img) return { width: 0, height: 0 };
                let w = img.width;
                let h = img.height;
                
                const imgTools = img.activeTools || [];
                const isExpand = imgTools.includes('expand');
                const aspect = img.aspectRatio || 'current';

                if (isExpand) {
                    let targetRatio = w / h;
                    if (aspect !== 'current') {
                        const parts = aspect.split(':');
                        if (parts.length === 2) {
                            const ratioW = parseFloat(parts[0]);
                            const ratioH = parseFloat(parts[1]);
                            targetRatio = ratioW / ratioH;
                        }
                    }

                    const currentRatio = w / h;
                    if (currentRatio < targetRatio) {
                        w = h * targetRatio;
                    } else {
                        h = w / targetRatio;
                    }
                }

                const option = img.upscaleOption || 'original';

                switch (option) {
                    case '0.5x':
                        return { width: Math.round(w * 0.5), height: Math.round(h * 0.5) };
                    case '0.75x':
                        return { width: Math.round(w * 0.75), height: Math.round(h * 0.75) };
                    case '2x':
                        return { width: Math.round(w * 2), height: Math.round(h * 2) };
                    case '4x':
                        return { width: Math.round(w * 4), height: Math.round(h * 4) };
                    case '8x':
                        return { width: Math.round(w * 8), height: Math.round(h * 8) };
                    case 'fhd':
                        return { width: 1920, height: 1080 };
                    case 'fhd_p':
                        return { width: 1080, height: 1920 };
                    case '4k':
                        return { width: 3840, height: 2160 };
                    case '4k_p':
                        return { width: 2160, height: 3840 };
                    case 'original':
                    default:
                        return { width: Math.round(w), height: Math.round(h) };
                }
            };

            const getTargetDimensions = () => {
                const activeImg = imagesList.find(img => img.id === activeImageId);
                return getDimensionsForImg(activeImg);
            };

            const targetDim = getTargetDimensions();

            const handleImageUpload = (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                const newImages = [];
                let loadedCount = 0;
                const imageFiles = files.filter(f => f.type.startsWith('image/'));

                if (imageFiles.length === 0) {
                    setError('Vui lòng chọn tệp định dạng ảnh hợp lệ.');
                    return;
                }

                imageFiles.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const imgObj = {
                                id: Date.now() + Math.random(),
                                name: file.name,
                                url: URL.createObjectURL(file),
                                base64: event.target.result,
                                mimeType: file.type,
                                width: img.naturalWidth,
                                height: img.naturalHeight,
                                result: null,
                                isProcessing: false,
                                error: null,
                                activeTools: ['enhance', 'cleanup'],
                                upscaleOption: 'original',
                                expandDirections: ['up', 'down', 'left', 'right'],
                                aspectRatio: 'current',
                                customPrompt: '',
                                moodboardImages: [],
                                crossRefImages: []
                            };
                            newImages.push(imgObj);
                            loadedCount++;

                            if (loadedCount === imageFiles.length) {
                                setImagesList(prev => {
                                    const updated = [...prev, ...newImages];
                                    if (!activeImageId && updated.length > 0) {
                                        setActiveImageId(updated[0].id);
                                        setActiveTools(['enhance', 'cleanup']);
                                        setUpscaleOption('original');
                                    }
                                    return updated;
                                });
                                setError('');
                            }
                        };
                        img.onerror = () => {
                            setError('Không thể đọc dữ liệu kích thước khung hình.');
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            const askDeleteImage = (id, e) => {
                e.stopPropagation();
                setDeleteConfirm({ show: true, type: 'queue', id });
            };

            const askDeleteHistory = (id, e) => {
                e.stopPropagation();
                setDeleteConfirm({ show: true, type: 'history', id });
            };

            const deleteImage = (id) => {
                setImagesList(prev => {
                    const next = prev.filter(img => img.id !== id);
                    if (activeImageId === id) {
                        if (next.length > 0) {
                            setActiveImageId(next[0].id);
                        } else {
                            setActiveImageId(null);
                        }
                    }
                    return next;
                });
            };

            const deleteHistoryItem = (id) => {
                setHistoryList(prev => prev.filter(item => item.id !== id));
            };

            const handleMoodboardUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if (!file.type.startsWith('image/')) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const updatedRef = [
                            ...moodboardImages, 
                            { id: Date.now() + Math.random(), url: URL.createObjectURL(file), base64: event.target.result, mimeType: file.type }
                        ];
                        setMoodboardImages(updatedRef);
                        updateActiveImageProp('moodboardImages', updatedRef);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleCrossRefUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if (!file.type.startsWith('image/')) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const updatedRef = [
                            ...crossRefImages, 
                            { id: Date.now() + Math.random(), url: URL.createObjectURL(file), base64: event.target.result, mimeType: file.type }
                        ];
                        setCrossRefImages(updatedRef);
                        updateActiveImageProp('crossRefImages', updatedRef);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const removeMoodboardImage = (id) => {
                const updated = moodboardImages.filter(img => img.id !== id);
                setMoodboardImages(updated);
                updateActiveImageProp('moodboardImages', updated);
            };

            const removeCrossRefImage = (id) => {
                const updated = crossRefImages.filter(img => img.id !== id);
                setCrossRefImages(updated);
                updateActiveImageProp('crossRefImages', updated);
            };

            const triggerFileInput = () => {
                fileInputRef.current?.click();
            };

            const toggleTool = (toolId) => {
                setActiveTools(prev => {
                    let next;
                    if (toolId === 'sketch') {
                        next = prev.includes('sketch') ? [] : ['sketch'];
                    } else {
                        if (prev.includes('sketch')) return prev;
                        
                        if (prev.includes(toolId)) {
                            next = prev.filter(id => id !== toolId);
                        } else {
                            next = [...prev, toolId];
                            if (toolId === 'enhance' && !next.includes('cleanup')) {
                                next.push('cleanup');
                            }
                            if (toolId === 'restore') {
                                const extras = ['enhance', 'cleanup', 'beautify'];
                                extras.forEach(t => {
                                    if (!next.includes(t)) {
                                        next.push(t);
                                    }
                                });
                            }
                        }
                    }
                    updateActiveImageProp('activeTools', next);
                    return next;
                });
            };

            const toggleExpandDirection = (dirId) => {
                setExpandDirections(prev => {
                    let next;
                    const allDirs = ['up', 'down', 'left', 'right'];
                    if (dirId === 'all') {
                        const isAll = allDirs.every(d => prev.includes(d));
                        next = isAll ? ['up', 'down'] : allDirs;
                    } else {
                        if (prev.includes(dirId)) {
                            next = prev.length > 1 ? prev.filter(d => d !== dirId) : prev;
                        } else {
                            next = [...prev, dirId];
                        }
                    }
                    updateActiveImageProp('expandDirections', next);
                    return next;
                });
            };

            const handleDropdownUpscaleChange = (e) => {
                const value = e.target.value;
                setUpscaleOption(value);
                updateActiveImageProp('upscaleOption', value);
            };

            const resizeImageToTarget = (srcBase64, targetW, targetH) => {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = targetW;
                        canvas.height = targetH;
                        const ctx = canvas.getContext('2d');
                        if (!ctx) {
                            reject(new Error("Không khởi tạo được bộ lọc Canvas 2D."));
                            return;
                        }
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, targetW, targetH);
                        resolve(canvas.toDataURL('image/png'));
                    };
                    img.onerror = () => reject(new Error("Lỗi tải tệp ảnh đầu ra."));
                    img.src = srcBase64;
                });
            };

            const fetchWithRetry = async (url, options, retries = 5) => {
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) {
                            const errText = await response.text();
                            throw new Error(`HTTP Error ${response.status}: ${errText}`);
                        }
                        return await response.json();
                    } catch (e) {
                        if (i === retries - 1) throw e;
                        await new Promise(res => setTimeout(res, delays[i]));
                    }
                }
            };

            const processSingleImage = async (targetId) => {
                const imgToProcess = imagesList.find(img => img.id === targetId);
                if (!imgToProcess) return;

                setImagesList(prev => prev.map(img => {
                    if (img.id === targetId) return { ...img, isProcessing: true, error: null };
                    return img;
                }));

                if (isDemoMode || !googleUser) {
                    await new Promise(res => setTimeout(res, 3000));
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = imgToProcess.width;
                    canvas.height = imgToProcess.height;
                    const ctx = canvas.getContext('2d');
                    const demoImg = new Image();
                    
                    demoImg.src = imgToProcess.url;
                    await new Promise((resolve) => {
                        demoImg.onload = () => {
                            ctx.filter = 'contrast(1.1) saturate(1.05) brightness(1.02)';
                            ctx.drawImage(demoImg, 0, 0);
                            resolve();
                        }
                    });

                    const demoResult = canvas.toDataURL('image/png');
                    setImagesList(prev => prev.map(img => {
                        if (img.id === targetId) {
                            return { ...img, result: demoResult, isProcessing: false, error: null };
                        }
                        return img;
                    }));
                    return;
                }

                try {
                    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent`;

                    const tDim = getDimensionsForImg(imgToProcess);
                    let instructions = [];
                    const imgTools = imgToProcess.activeTools || ['enhance'];
                    const imgUpscale = imgToProcess.upscaleOption || 'original';
                    const imgExpandDirs = imgToProcess.expandDirections || ['up', 'down', 'left', 'right'];
                    const imgAspect = imgToProcess.aspectRatio || 'current';
                    const imgPrompt = imgToProcess.customPrompt || '';
                    const imgMoodboards = imgToProcess.moodboardImages || [];
                    const imgCrossRefs = imgToProcess.crossRefImages || [];

                    if (!imgTools.includes('expand')) {
                        instructions.push("CRITICAL REQUIREMENT: Do NOT outpaint, do NOT expand, do NOT crop, and do NOT add any new outer borders to the image. Keep the exact visual boundaries, composition, framing, and aspect ratio of the original image.");
                    }
                    if (imgTools.includes('enhance') || imgUpscale !== 'original') {
                        instructions.push(`Enhance details, sharpen textures, remove noise/blur, and super-resolve this image. Make it extremely crisp and clean, optimized for upscaling/downscaling to resolution (${tDim.width}x${tDim.height} pixels).`);
                    }
                    if (imgTools.includes('expand')) {
                        let directionText = "in all directions";
                        if (imgExpandDirs.length === 4) {
                            directionText = "in all directions (top, bottom, left, and right)";
                        } else {
                            const translatedDirs = imgExpandDirs.map(d => {
                                if (d === 'up') return "upward (to the top)";
                                if (d === 'down') return "downward (to the bottom)";
                                if (d === 'left') return "to the left side";
                                if (d === 'right') return "to the right side";
                                return "";
                            }).filter(Boolean);
                            directionText = `towards the following directions: ${translatedDirs.join(', ')}`;
                        }
                        const aspectLabel = imgAspect === 'current' ? 'its current ratio' : `${imgAspect} aspect ratio`;
                        instructions.push(`Outpaint and expand the borders of this image seamlessly ${directionText} to adapt into a beautiful layout matching the ${aspectLabel}.`);
                    }
                    if (imgTools.includes('cleanup')) {
                        instructions.push("Remove any text, watermarks, symbols, icons, or unnecessary objects from this image. Fill in the background seamlessly and naturally.");
                    }
                    if (imgTools.includes('restore')) {
                        instructions.push("Perform advanced old photo restoration: repair scratches, remove vintage grain, recover faded colors, and optimize contrast.");
                    }
                    if (imgTools.includes('sketch')) {
                        let sketchPrompt = "Convert this sketch or line drawing into a photorealistic modern architectural or spatial render with rich professional materials, beautiful dramatic environment lighting, and natural shadows.";
                        if (imgMoodboards.length > 0) {
                            sketchPrompt += " Integrate the style, material textures, colors, and interior design theme from the provided moodboard reference images.";
                        }
                        if (imgCrossRefs.length > 0) {
                            sketchPrompt += " Crucially, cross-reference the details, layout, and structural features of the same space from the provided reference images. Maintain maximum spatial accuracy based on those reference images without altering the camera perspective and overall structural orientation of the main sketch.";
                        }
                        instructions.push(sketchPrompt);
                    }
                    if (imgTools.includes('beautify')) {
                        instructions.push("Apply studio-quality portrait retouching: smoothly refine skin texture naturally, eliminate skin blemishes, enhance eyes contrast, optimize ambient lighting, and highlight facial aesthetics elegantly.");
                    }

                    let finalPrompt = "Please perform the following operations on the provided image:\n" + instructions.map(i => "- " + i).join("\n");
                    if (imgPrompt.trim()) {
                        finalPrompt += "\n\nAdditional instructions:\n" + imgPrompt.trim();
                    }

                    const base64DataOnly = imgToProcess.base64.split(',')[1];
                    const payloadParts = [
                        { text: finalPrompt },
                        { inlineData: { mimeType: imgToProcess.mimeType, data: base64DataOnly } }
                    ];

                    imgMoodboards.forEach((mb, idx) => {
                        payloadParts.push({ text: `[Moodboard reference image ${idx + 1} for design theme & colors]` });
                        payloadParts.push({ inlineData: { mimeType: mb.mimeType, data: mb.base64.split(',')[1] } });
                    });

                    imgCrossRefs.forEach((cr, idx) => {
                        payloadParts.push({ text: `[Spatial cross-reference angle image ${idx + 1} of the same space]` });
                        payloadParts.push({ inlineData: { mimeType: cr.mimeType, data: cr.base64.split(',')[1] } });
                    });

                    const payload = {
                        contents: [{ role: "user", parts: payloadParts }],
                        generationConfig: { responseModalities: ["IMAGE"] }
                    };

                    const result = await fetchWithRetry(endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${googleUser.accessToken}`
                        },
                        body: JSON.stringify(payload)
                    });

                    const responseParts = result.candidates?.[0]?.content?.parts;
                    const imagePart = responseParts?.find(p => p.inlineData);
                    
                    if (imagePart && imagePart.inlineData && imagePart.inlineData.data) {
                        const resultBase64 = `data:${imagePart.inlineData.mimeType || 'image/png'};base64,${imagePart.inlineData.data}`;
                        const upscaledDataUrl = await resizeImageToTarget(resultBase64, tDim.width, tDim.height);
                        
                        setImagesList(prev => prev.map(img => {
                            if (img.id === targetId) {
                                return { ...img, result: upscaledDataUrl, isProcessing: false, error: null };
                            }
                            return img;
                        }));

                        const newHistoryItem = {
                            id: Date.now() + Math.random(),
                            original: imgToProcess,
                            result: upscaledDataUrl,
                            activeTools: [...imgTools],
                            upscaleOption: imgUpscale,
                            targetDim: { width: tDim.width, height: tDim.height },
                            timestamp: new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })
                        };
                        setHistoryList(prev => [newHistoryItem, ...prev]);
                    } else {
                        throw new Error("Không tìm thấy dữ liệu ảnh nâng cấp trả về từ máy chủ.");
                    }

                } catch (err) {
                    console.error(err);
                    setImagesList(prev => prev.map(img => {
                        if (img.id === targetId) return { ...img, isProcessing: false, error: err.message || 'Lỗi xử lý API' };
                        return img;
                    }));
                }
            };

            const processActiveImage = async () => {
                if (!activeImageId) return;
                setIsProcessing(true);
                setError('');
                try {
                    await processSingleImage(activeImageId);
                } catch (err) {
                    setError("Gặp gián đoạn trong lúc xử lý ảnh đơn.");
                } finally {
                    setIsProcessing(false);
                }
            };

            const processBatchAll = async () => {
                if (imagesList.length === 0) return;
                setIsBatchProcessing(true);
                isCancelBatchRef.current = false;
                setError('');

                try {
                    for (let i = 0; i < imagesList.length; i++) {
                        if (isCancelBatchRef.current) {
                            setError("Dừng xử lý khẩn cấp thành công.");
                            break;
                        }

                        const currentImg = imagesList[i];
                        if (!currentImg.result) {
                            selectImage(currentImg.id);
                            await new Promise(resolve => setTimeout(resolve, 200));
                            
                            if (isCancelBatchRef.current) {
                                setError("Dừng xử lý khẩn cấp thành công.");
                                break;
                            }
                            await processSingleImage(currentImg.id);
                        }
                    }
                } catch (err) {
                    setError("Có lỗi phát sinh trong hàng chờ xử lý.");
                } finally {
                    setIsBatchProcessing(false);
                }
            };

            const stopBatchProcessing = () => {
                isCancelBatchRef.current = true;
                setIsBatchProcessing(false);
            };

            const downloadResult = async () => {
                const activeImg = imagesList.find(img => img.id === activeImageId);
                if (!activeImg || !activeImg.result) return;
                try {
                    const response = await fetch(activeImg.result);
                    const blob = await response.blob();
                    const blobUrl = URL.createObjectURL(blob);
                    
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    const tD = getDimensionsForImg(activeImg);
                    link.download = `AI_Enhanced_${tD.width}x${tD.height}_${Date.now()}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
                } catch (e) {
                    const link = document.createElement('a');
                    link.href = activeImg.result;
                    link.download = `AI_Enhanced_${Date.now()}.png`;
                    link.click();
                }
            };

            const downloadAllAsZip = async () => {
                if (!window.JSZip) {
                    setError("Thư viện ZIP chưa được tải đầy đủ.");
                    return;
                }

                const processed = imagesList.filter(img => img.result);
                if (processed.length === 0) {
                    setError("Không có ảnh kết quả nào để tải.");
                    return;
                }

                setIsProcessing(true);
                try {
                    const zip = new window.JSZip();
                    const folder = zip.folder("AI_Enhanced_Images");

                    for (let i = 0; i < processed.length; i++) {
                        const img = processed[i];
                        const response = await fetch(img.result);
                        const blob = await response.blob();
                        folder.file(`AI_Result_${i + 1}_${img.name}.png`, blob);
                    }

                    const content = await zip.generateAsync({ type: "blob" });
                    const blobUrl = URL.createObjectURL(content);

                    const link = document.createElement('a');
                    link.href = blobUrl;
                    link.download = `AI_Enhanced_Batch_${Date.now()}.zip`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (e) {
                    setError("Lỗi tạo file nén ZIP: " + e.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            const saveProgressJSON = () => {
                try {
                    const progressData = {
                        imagesList,
                        activeImageId,
                        historyList,
                        activeTools,
                        expandDirections,
                        aspectRatio,
                        upscaleOption,
                        customPrompt,
                        moodboardImages,
                        crossRefImages
                    };
                    
                    const blob = new Blob([JSON.stringify(progressData, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `AI_Enhancer_Progress_${new Date().toISOString().split('T')[0]}_${Date.now()}.json`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    setTimeout(() => URL.revokeObjectURL(url), 100);
                } catch (err) {
                    setError("Không thể lưu tiến trình: " + err.message);
                }
            };

            const loadProgressJSON = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (!parsed || typeof parsed !== 'object') {
                            throw new Error("Dữ liệu tệp JSON không hợp lệ.");
                        }

                        if (Array.isArray(parsed.imagesList)) setImagesList(parsed.imagesList);
                        if (parsed.activeImageId) setActiveImageId(parsed.activeImageId);
                        if (Array.isArray(parsed.historyList)) setHistoryList(parsed.historyList);
                        if (Array.isArray(parsed.activeTools)) setActiveTools(parsed.activeTools);
                        if (Array.isArray(parsed.expandDirections)) setExpandDirections(parsed.expandDirections);
                        if (parsed.aspectRatio) setAspectRatio(parsed.aspectRatio);
                        if (parsed.upscaleOption) setUpscaleOption(parsed.upscaleOption);
                        if (parsed.customPrompt !== undefined) setCustomPrompt(parsed.customPrompt);
                        if (Array.isArray(parsed.moodboardImages)) setMoodboardImages(parsed.moodboardImages);
                        if (Array.isArray(parsed.crossRefImages)) setCrossRefImages(parsed.crossRefImages);

                        setZoomScale(1);
                        setPanOffset({ x: 0, y: 0 });
                        setError('');
                    } catch (err) {
                        setError("Lỗi nạp tệp tiến trình. Đảm bảo đây là tệp JSON hợp lệ.");
                    }
                };
                reader.readAsText(file);
            };

            const loadHistoryItem = (item) => {
                setImagesList(prev => {
                    const exists = prev.some(img => img.id === item.original.id);
                    if (exists) {
                        return prev.map(img => {
                            if (img.id === item.original.id) {
                                return { ...img, result: item.result };
                            }
                            return img;
                        });
                    } else {
                        return [...prev, { ...item.original, result: item.result }];
                    }
                });

                setTimeout(() => {
                    setActiveImageId(item.original.id);
                    setActiveTools(item.activeTools);
                    setUpscaleOption(item.upscaleOption);
                    setExpandDirections(item.original.expandDirections || ['up', 'down', 'left', 'right']);
                    setAspectRatio(item.original.aspectRatio || 'current');
                    setViewMode('split');
                    setZoomScale(1);
                    setPanOffset({ x: 0, y: 0 });
                    setError('');
                }, 50);
            };

            const handlePointerDown = (e) => {
                if (zoomScale <= 1) return;
                if (viewMode === 'split' && !panMode) return;
                
                setIsPanning(true);
                panStart.current = { x: e.clientX - panOffset.x, y: e.clientY - panOffset.y };
                e.currentTarget.setPointerCapture(e.pointerId);
            };

            const handlePointerMove = (e) => {
                if (!isPanning || zoomScale <= 1) return;
                const newX = e.clientX - panStart.current.x;
                const newY = e.clientY - panStart.current.y;
                setPanOffset({ x: newX, y: newY });
            };

            const handlePointerUp = (e) => {
                setIsPanning(false);
                try {
                    e.currentTarget.releasePointerCapture(e.pointerId);
                } catch (err) {}
            };

            const resetZoomAndPan = () => {
                setZoomScale(1);
                setPanOffset({ x: 0, y: 0 });
            };

            const activeImage = imagesList.find(img => img.id === activeImageId);
            const isProcessReady = activeTools.length > 0 || customPrompt.trim().length > 0;
            const isSketchActive = activeTools.includes('sketch');

            return (
                <div className="flex-1 flex flex-col justify-between">
                    
                    {/* Header bar */}
                    <header className="border-b border-slate-800 bg-slate-900/50 sticky top-0 z-10 backdrop-blur-md">
                        <div className="max-w-[1700px] mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-gradient-to-br from-indigo-500 to-purple-600 p-1.5 rounded-lg shadow-lg shadow-indigo-500/10">
                                    <i className="fa-solid fa-sparkles text-white text-sm"></i>
                                </div>
                                <div>
                                    <h1 className="text-sm sm:text-base font-bold bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
                                        AI Enhancer Image
                                    </h1>
                                    <p className="text-[10px] text-slate-500 font-medium tracking-wide">SIÊU PHÂN GIẢI & PHỤC HỒI CHI TIẾT</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <button
                                    onClick={saveProgressJSON}
                                    className="flex items-center gap-1.5 text-xs bg-slate-900 border border-slate-800 hover:bg-slate-800 text-indigo-400 font-semibold px-3 py-1.5 rounded-lg transition-all"
                                    title="Lưu toàn bộ tiến trình hiện tại thành tệp JSON"
                                >
                                    <i className="fa-solid fa-floppy-disk"></i>
                                    <span className="hidden sm:inline">Lưu tiến trình</span>
                                </button>
                                <button
                                    onClick={() => jsonInputRef.current?.click()}
                                    className="flex items-center gap-1.5 text-xs bg-slate-900 border border-slate-800 hover:bg-slate-800 text-indigo-400 font-semibold px-3 py-1.5 rounded-lg transition-all"
                                    title="Mở tệp JSON đã lưu để tiếp tục làm việc"
                                >
                                    <i className="fa-solid fa-folder-open"></i>
                                    <span class="hidden sm:inline">Nạp tiến trình</span>
                                </button>
                                <input
                                    type="file"
                                    ref={jsonInputRef}
                                    onChange={loadProgressJSON}
                                    accept=".json"
                                    className="hidden"
                                />
                            </div>
                        </div>
                    </header>

                    {/* --- STREAMING_CHUNK: Giao diện Đăng nhập Google và Cấp quyền OAuth --- */}
                    <div className="bg-slate-900/40 border-b border-slate-800/80 py-2">
                        <div className="max-w-[1700px] mx-auto px-4 sm:px-6 lg:px-8 flex flex-wrap items-center justify-between gap-3 text-xs">
                            
                            <div className="flex items-center gap-2">
                                {googleUser ? (
                                    <>
                                        <div className="w-6 h-6 rounded-full overflow-hidden border border-indigo-500/30">
                                            <img src={googleUser.picture} alt="Profile" className="w-full h-full object-cover" />
                                        </div>
                                        <div className="leading-none">
                                            <p className="text-[11px] font-semibold text-slate-200">{googleUser.name}</p>
                                            <p className="text-[9px] text-slate-500">{googleUser.email}</p>
                                        </div>
                                    </>
                                ) : (
                                    <div className="flex items-center gap-1.5 text-slate-400 text-[11px]">
                                        <i className="fa-solid fa-cloud text-slate-500"></i>
                                        <span>Hãy đăng nhập tài khoản Google để tự cấp quyền sử dụng hạn mức Gemini cá nhân miễn phí.</span>
                                    </div>
                                )}
                            </div>

                            <div className="flex items-center gap-2">
                                {googleUser ? (
                                    <>
                                        <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-slate-950/80 border border-slate-800 text-[10px] font-medium text-slate-300">
                                            {syncStatus === 'syncing' && (
                                                <>
                                                    <i className="fa-solid fa-circle-notch animate-spin text-indigo-400"></i>
                                                    <span>Đang sao lưu Drive...</span>
                                                </>
                                            )}
                                            {syncStatus === 'synced' && (
                                                <>
                                                    <i className="fa-solid fa-cloud-arrow-up text-emerald-400"></i>
                                                    <span className="text-emerald-400">Đã lưu Drive</span>
                                                </>
                                            )}
                                            {syncStatus === 'idle' && (
                                                <>
                                                    <i className="fa-solid fa-cloud text-slate-400"></i>
                                                    <span>Chưa đồng bộ</span>
                                                </>
                                            )}
                                            {syncStatus === 'error' && (
                                                <>
                                                    <i className="fa-solid fa-triangle-exclamation text-red-400"></i>
                                                    <span className="text-red-400">Lỗi sao lưu</span>
                                                </>
                                            )}
                                        </div>

                                        <button 
                                            onClick={syncSessionToDrive}
                                            disabled={syncStatus === 'syncing'}
                                            className="flex items-center gap-1 text-[10px] bg-indigo-600/10 hover:bg-indigo-600/20 text-indigo-400 border border-indigo-500/25 px-2.5 py-1 rounded-lg transition-all"
                                        >
                                            <i className="fa-solid fa-rotate"></i>
                                            <span>Đồng bộ</span>
                                        </button>

                                        <button 
                                            onClick={handleGoogleSignOut}
                                            className="flex items-center gap-1 text-[10px] bg-slate-950 hover:bg-slate-850 text-slate-400 hover:text-white border border-slate-800 px-2 py-1 rounded-lg transition-all"
                                        >
                                            <i className="fa-solid fa-right-from-bracket"></i>
                                            <span>Thoát</span>
                                        </button>
                                    </>
                                ) : (
                                    <div className="flex gap-1.5">
                                        <button 
                                            onClick={() => {
                                                setIsDemoMode(true);
                                                setError('');
                                            }}
                                            className={`text-xs px-3 py-1.5 rounded-lg border font-medium transition-all ${isDemoMode ? 'bg-amber-500/15 border-amber-500 text-amber-400' : 'bg-slate-900 border-slate-800 text-slate-400 hover:text-white'}`}
                                        >
                                            Dùng thử Demo (Offline)
                                        </button>
                                        <button 
                                            onClick={handleGoogleSignIn}
                                            className="flex items-center gap-1.5 text-xs bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-4 py-1.5 rounded-lg shadow-lg shadow-indigo-600/15 transition-all active:scale-[0.98]"
                                        >
                                            <i className="fa-brands fa-google"></i>
                                            <span>Đăng nhập Google Drive</span>
                                        </button>
                                    </div>
                                )}
                            </div>

                        </div>
                    </div>

                    {/* --- STREAMING_CHUNK: Giao diện chính của ứng dụng --- */}
                    <main className="max-w-[1700px] mx-auto px-4 sm:px-6 lg:px-8 py-4 w-full flex-1">
                        
                        {error && (
                            <div className="mb-4 bg-red-500/10 border border-red-500/50 rounded-xl p-3 flex items-start gap-2.5 text-red-400 text-xs animate-pulse">
                                <i className="fa-solid fa-circle-exclamation shrink-0 mt-0.5 text-red-500"></i>
                                <div>
                                    <h3 className="font-semibold text-red-300">Lỗi hệ thống</h3>
                                    <p>{error}</p>
                                </div>
                            </div>
                        )}

                        {imagesList.length === 0 ? (
                            <div className="max-w-xl mx-auto mt-16">
                                <div 
                                    onClick={triggerFileInput}
                                    className="border border-dashed border-slate-800 hover:border-indigo-500 bg-slate-900/30 hover:bg-slate-900/50 transition-all duration-300 rounded-2xl p-8 cursor-pointer flex flex-col items-center justify-center text-center group"
                                >
                                    <div className="bg-slate-800 group-hover:bg-indigo-500/10 p-3 rounded-full mb-4 transition-colors duration-300">
                                        <i className="fa-solid fa-cloud-arrow-up text-slate-400 group-hover:text-indigo-400 text-xl"></i>
                                    </div>
                                    <h3 className="text-lg font-semibold mb-1">Tải ảnh của bạn lên</h3>
                                    <p className="text-xs text-slate-500 mb-6 max-w-xs">
                                        Hỗ trợ tải lên cùng lúc nhiều ảnh JPEG, PNG, WEBP để tăng nét hoặc xử lý hàng loạt.
                                    </p>
                                    <button className="bg-white text-slate-950 text-xs font-semibold px-4 py-2 rounded-full hover:bg-slate-200 transition-colors shadow-lg shadow-white/5">
                                        Chọn các tệp từ thiết bị
                                    </button>
                                    <input 
                                        type="file" 
                                        ref={fileInputRef} 
                                        onChange={handleImageUpload} 
                                        accept="image/*" 
                                        multiple
                                        className="hidden" 
                                    />
                                </div>

                                <div className="mt-6 flex flex-col items-center p-4 rounded-xl border border-slate-900 bg-slate-900/10">
                                    <p className="text-xs text-slate-500 mb-2.5">Hoặc bạn muốn mở tiếp tiến trình đã làm trước đó?</p>
                                    <button
                                        onClick={() => jsonInputRef.current?.click()}
                                        className="flex items-center gap-2 text-xs bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 font-semibold px-4 py-2 rounded-lg transition-all"
                                    >
                                        <i className="fa-solid fa-folder-open"></i>
                                        Mở tệp lưu tiến trình (.json)
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-5 items-start">
                                
                                {/* Left column: Viewer & List */}
                                <div className="lg:col-span-8 flex flex-col gap-4">
                                    
                                    {/* Queue List */}
                                    <div className="flex items-center gap-2 overflow-x-auto pb-1.5 border-b border-slate-900 bg-slate-900/20 p-2 rounded-xl">
                                        <span className="text-[9px] font-bold text-slate-500 uppercase tracking-wider shrink-0 mr-1">Hình đợi:</span>
                                        {imagesList.map((img, idx) => (
                                            <div 
                                                key={img.id}
                                                onClick={() => selectImage(img.id)}
                                                className={`group/thumb relative cursor-pointer rounded-lg overflow-hidden border transition-all shrink-0 w-11 h-11 ${
                                                    activeImageId === img.id ? 'border-indigo-500 ring-1 ring-indigo-500/50' : 'border-slate-850 opacity-80 hover:opacity-100'
                                                }`}
                                            >

                                                >
                                                    <i className="fa-solid fa-file-zipper"></i>
                                                    <span>Nén ZIP tải xuống toàn bộ ({imagesList.filter(img => img.result).length} ảnh)</span>
                                                </button>
                                            )}
                                        </div>

                                    </div>

                                </div>

                            </div>
                        )}

                    </main>

                    {/* Hộp thoại xác nhận tùy chỉnh an toàn (Custom confirmation modal) */}
                    {deleteConfirm.show && (
                        <div className="fixed inset-0 bg-slate-950/85 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-slate-800 rounded-xl max-w-sm w-full p-5 shadow-2xl relative">
                                <div className="text-red-500 bg-red-500/10 w-10 h-10 rounded-full flex items-center justify-center mb-3">
                                    <i className="fa-solid fa-trash text-lg"></i>
                                </div>
                                <h3 className="text-sm font-bold text-white mb-1.5">Xác nhận xóa hình</h3>
                                <p className="text-xs text-slate-400 mb-4 leading-normal">
                                    {deleteConfirm.type === 'queue' 
                                        ? 'Bạn có chắc chắn muốn xóa hình ảnh này khỏi hàng đợi? Tiến trình chưa làm cho hình này sẽ bị hủy.' 
                                        : 'Bạn có chắc chắn muốn xóa bản ghi này khỏi lịch sử đã làm? Điều này không làm ảnh hưởng tới hàng đợi.'}
                                </p>
                                <div className="flex justify-end gap-2 text-xs font-semibold">
                                    <button 
                                        onClick={() => setDeleteConfirm({ show: false, type: null, id: null })}
                                        className="px-4 py-2 text-slate-300 bg-slate-800 hover:bg-slate-750 rounded-lg transition-colors"
                                    >
                                        Hủy bỏ
                                    </button>
                                    <button 
                                        onClick={() => {
                                            if (deleteConfirm.type === 'queue') {
                                                deleteImage(deleteConfirm.id);
                                            } else if (deleteConfirm.type === 'history') {
                                                deleteHistoryItem(deleteConfirm.id);
                                            }
                                            setDeleteConfirm({ show: false, type: null, id: null });
                                        }}
                                        className="px-4 py-2 text-white bg-red-600 hover:bg-red-500 rounded-lg transition-colors"
                                    >
                                        Đồng ý xóa
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Render ứng dụng React hoàn chỉnh
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Footer -->
    <footer class="w-full border-t border-slate-900/60 bg-slate-950/80 mt-10 py-6 text-center text-xs text-slate-500">
        <div class="max-w-[1700px] mx-auto px-4 flex flex-col sm:flex-row items-center justify-center gap-2">
            <p class="flex items-center gap-1">
                <span>Built by:</span>
                <span class="text-indigo-400 font-bold hover:text-indigo-300 transition-colors tracking-wide">
                    Tran Quang Hải
                </span>
            </p>
            <span class="hidden sm:inline text-slate-700">|</span>
            <p class="text-[10px] text-slate-600">
                © 2026 AI Enhancer Image. All Rights Reserved.
            </p>
        </div>
    </footer>

</body>
</html>
